name: Release

'on':
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish, for example v0.1.0'
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ github.event.inputs.tag }}"
          if [[ -z "$tag" ]]; then
            tag="${GITHUB_REF_NAME}"
          fi
          if [[ -z "$tag" ]]; then
            echo "No tag supplied." >&2
            exit 1
          fi
          version="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Verify package version
        shell: bash
        run: |
          set -euo pipefail
          expected="${{ steps.meta.outputs.version }}"
          actual="$(python - <<'PY'
from pathlib import Path
import re
setup_text = Path('setup.py').read_text()
match = re.search(r'version="([^"]+)"', setup_text)
print(match.group(1))
PY
)"
          if [[ "$actual" != "$expected" ]]; then
            echo "Version mismatch: setup.py=$actual tag=$expected" >&2
            exit 1
          fi
          init_version="$(PYTHONPATH=src python - <<'PY'
from hca_cli import __version__
print(__version__)
PY
)"
          if [[ "$init_version" != "$expected" ]]; then
            echo "__init__.py version mismatch: $init_version != $expected" >&2
            exit 1
          fi

      - name: Create source tarball
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          git archive \
            --format=tar.gz \
            --prefix="hca-cli-${{ steps.meta.outputs.version }}/" \
            -o "dist/hca-cli-${{ steps.meta.outputs.version }}.tar.gz" \
            HEAD

      - name: Build Arch package in Docker
        shell: bash
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            archlinux:base-devel \
            bash -lc "
              set -euo pipefail
              pacman -Syu --noconfirm base-devel python python-setuptools
              cp dist/hca-cli-${VERSION}.tar.gz packaging/arch/
              useradd -m builder
              chown -R builder:builder /work
              su builder -c 'cd /work/packaging/arch && makepkg --syncdeps --noconfirm --force --cleanbuild'
            "

      - name: Collect release assets
        shell: bash
        run: |
          set -euo pipefail
          cp packaging/arch/*.pkg.tar.zst dist/
          cp packaging/arch/PKGBUILD dist/
          cp packaging/arch/.SRCINFO dist/
          (cd dist && sha256sum * > SHA256SUMS)

      - name: Publish GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "${{ steps.meta.outputs.tag }}" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "${{ steps.meta.outputs.tag }}" dist/* --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "${{ steps.meta.outputs.tag }}" dist/* \
              --repo "$GITHUB_REPOSITORY" \
              --title "${{ steps.meta.outputs.tag }}" \
              --generate-notes
          fi
