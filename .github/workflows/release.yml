name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    steps:
      - name: Install build dependencies
        run: |
          pacman -Syu --noconfirm git github-cli python python-setuptools

      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive version metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME:-}"
          if [[ -n "$tag" ]]; then
            version="${tag#v}"
          else
            version="$(python - <<'PY'
from pathlib import Path
import re
text = Path('src/hca_cli/__init__.py').read_text()
match = re.search(r'__version__ = "([^"]+)"', text)
print(match.group(1))
PY
)"
            tag="v${version}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Verify package version
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
from pathlib import Path
import re
setup_text = Path('setup.py').read_text()
init_text = Path('src/hca_cli/__init__.py').read_text()
setup_version = re.search(r'version="([^"]+)"', setup_text).group(1)
init_version = re.search(r'__version__ = "([^"]+)"', init_text).group(1)
if setup_version != init_version:
    raise SystemExit(f"setup.py version {setup_version} != __init__.py version {init_version}")
PY
          test "${{ steps.meta.outputs.version }}" = "$(python - <<'PY'
from hca_cli import __version__
print(__version__)
PY
)"
        env:
          PYTHONPATH: src

      - name: Create source tarball
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          git archive --format=tar.gz --prefix="hca-cli-${{ steps.meta.outputs.version }}/" -o "dist/hca-cli-${{ steps.meta.outputs.version }}.tar.gz" HEAD
          cp dist/hca-cli-${{ steps.meta.outputs.version }}.tar.gz packaging/arch/

      - name: Build pacman package
        shell: bash
        run: |
          set -euo pipefail
          useradd -m builder
          chown -R builder:builder "$GITHUB_WORKSPACE"
          su builder -c "cd '$GITHUB_WORKSPACE/packaging/arch' && makepkg --force --cleanbuild --noconfirm"

      - name: Create checksums
        shell: bash
        run: |
          set -euo pipefail
          cp packaging/arch/*.pkg.tar.zst dist/
          cp packaging/arch/PKGBUILD dist/
          cp packaging/arch/.SRCINFO dist/
          sha256sum dist/* > dist/SHA256SUMS

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "${{ steps.meta.outputs.tag }}" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "${{ steps.meta.outputs.tag }}" dist/* --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "${{ steps.meta.outputs.tag }}" dist/* \
              --repo "$GITHUB_REPOSITORY" \
              --title "${{ steps.meta.outputs.tag }}" \
              --generate-notes
          fi
